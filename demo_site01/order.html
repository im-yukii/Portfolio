<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>購入フォーム</title>
<!-- reset.css modern-css-reset -->
<link rel="stylesheet" href="https://unpkg.com/modern-css-reset/dist/reset.min.css"/>
<!--自作のCSS-->
<link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="img/favicon.png"/>
<!--Adobefont--> 
<script>
  (function(d) {
    var config = {
      kitId: 'ilv3sbr',
      scriptTimeout: 3000,
      async: true
    },
    h=d.documentElement,t=setTimeout(function(){h.className=h.className.replace(/\bwf-loading\b/g,"")+" wf-inactive";},config.scriptTimeout),tk=d.createElement("script"),f=false,s=d.getElementsByTagName("script")[0],a;h.className+=" wf-loading";tk.src='https://use.typekit.net/'+config.kitId+'.js';tk.async=true;tk.onload=tk.onreadystatechange=function(){a=this.readyState;if(f||a&&a!="complete"&&a!="loaded")return;f=true;clearTimeout(t);try{Typekit.load(config)}catch(e){}};s.parentNode.insertBefore(tk,s)
  })(document);
</script>
</head>

<body id="order">
<header>
<a href="index.html"><img class="Flogo" src="img/logo.png" alt="logo"></a>
    </header>
<div class="Form">
        <h1>ご注文内容</h1>
        <div class="Form-Item" id="fastFormItem">
                <p class="ProductName">商品名</p>
                <select name="select" id="select">
                        <option value="1"> 選択してください</option>
                        <option value="2" selected>uruシャンプー(夏の終わりの金木犀の香り)</option>
                        <option value="3" selected>uruトリートメント(雨上がりの金木犀の香り)</option>
                        <option value="" selected>uru金木犀の香りシリーズセット（サンプル付）</option>
                </select>
        </div>
        <h2>購入者情報</h2>
        <div class="Form-Item">
                <p class="Form-Item-Label"><span class="Form-Item-Label-Required">必須</span>お名前</p>
                <input type="text" class="Form-Item-Input" placeholder="例）山田花子">
        </div>
    <div class="Form-Item">
                <p class="Form-Item-Label"><span class="Form-Item-Label-Required">必須</span>フリガナ</p>
                <input type="text" class="Form-Item-Input" placeholder="例）ヤマダハナコ">
        </div>
        <div class="Form-Item">
                <p class="Form-Item-Label"><span class="Form-Item-Label-Required">必須</span>電話番号</p>
                <input type="text" class="Form-Item-Input" placeholder="例）000-0000-0000">
        </div>
        <div class="Form-Item">
                <p class="Form-Item-Label"><span class="Form-Item-Label-Required">必須</span>メールアドレス</p>
                <input type="email" class="Form-Item-Input" placeholder="例）example@gmail.com">
        </div>
    <div class="Form-Item">
                <p class="Form-Item-Label"><span class="Form-Item-Label-Required">必須</span>郵便番号</p>
                <input type="text" class="Form-Item-Input" placeholder="例）000-000">
        </div>
    <div class="Form-Item">
                <p class="Form-Item-Label"><span class="Form-Item-Label-Required">必須</span>都道府県</p>
                <input type="text" class="Form-Item-Input" placeholder="例）東京都">
        </div>
    <div class="Form-Item" id="lastFormItem">
                <p class="Form-Item-Label"><span class="Form-Item-Label-Required">必須</span>住所</p>
                <input type="text" class="Form-Item-Input" placeholder="例）〇〇区">
        </div>
        <h2>以下の質問にお答えください</h2>
        <div class="question">
                <div class="Q1">
                        <p>【1】uruの商品をどこで知りましたか？</p>
                        <input type="checkbox" name="check1" value="1">
                        インスタ<br>
                        <input type="checkbox" name="check1" value="2">
                        ツイッター<br>
                        <input type="checkbox" name="check1" value="3">
                        広告<br>
                        <input type="checkbox" name="check1" value="4">
                        店舗<br>
                        <input type="checkbox" name="check1" value="5">
                        知人 </div>
                <div class="Q2">
                        <p>【2】金木犀シリーズ以降も定番の香りが登場したら購入したいと思いますか？</p>
                        <input type="checkbox" name="check1" value="1">
                        はい<br>
                        <input type="checkbox" name="check1" value="2">
                        いいえ<br>
                        <input type="checkbox" name="check1" value="3">
                        香りによる </div>
                <div class="Q3">
                        <p>【3】ヘアケア商品であったらほしい商品はありますか？</p>
                        <input type="checkbox" name="check1" value="1">
                        集中ケアトリートメント<br>
                        <input type="checkbox" name="check1" value="2">
                        お泊り用ミニボトルセット<br>
                        <input type="checkbox" name="check1" value="3">
                        アウトバスオイル </div>
        </div>
        <div class="Form-Item">
                <p class="Form-Item-Label isMsg"><span class="Form-Item-Label-Required">必須</span>お問い合わせ内容</p>
                <textarea class="Form-Item-Textarea"></textarea>
        </div>
        <input type="submit" class="Form-Btn" value="注文確認画面へ">
</div>
<footer> <small>&copy;2023 uru official</small> </footer>
</body>
</html>
